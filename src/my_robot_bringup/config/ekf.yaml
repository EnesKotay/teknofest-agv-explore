# ============================================================================
# EKF (Extended Kalman Filter) Konfigürasyonu
# ============================================================================
# Robot Localization paketi ile odometry ve IMU verilerini birleştirir
# Daha doğru pozisyon tahmini sağlar
#
# Teknofest-AGV değerleriyle güncellendi
# ============================================================================

ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # IMU (MPU6050) - Teknofest-AGV'de kullanılıyor
    # Eğer IMU yoksa bu bölümü yorum satırı yapabilirsiniz
    imu0: /imu/mpu6050
    imu0_config: [false, false, false,  # Position x, y, z
                  false, false, true,   # Orientation roll, pitch, yaw (sadece yaw)
                  false, false, false,  # Velocity x, y, z
                  false, false, true,   # Angular velocity x, y, z (sadece z)
                  true, false, false]   # Linear acceleration x, y, z (sadece x)
    imu0_differential: false

    # Odometry (diff_drive_controller'dan geliyor)
    odom0: /diff_drive_controller/odom
    odom0_config: [false, false, false,  # Position x, y, z
                   false, false, true,   # Orientation roll, pitch, yaw (sadece yaw)
                   true, true, false,    # Velocity x, y, z (sadece x, y)
                   false, false, true,   # Angular velocity x, y, z (sadece z)
                   false, false, false]  # Linear acceleration x, y, z
    odom0_differential: false
    publish_tf: true
