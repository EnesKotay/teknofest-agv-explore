# ============================================================================
# Frontier Explorer Parametreleri
# ============================================================================
# Bu dosya frontier_explorer.py node'unun parametrelerini içerir.
#
# Ne yapar: Otonom keşif algoritması - haritadaki keşfedilmemiş alanları bulur
#           ve robotu oraya yönlendirir (frontier-based exploration).
#
# Ana özellikler:
# - Information Gain: Büyük keşfedilmemiş alana yakın frontierleri önceliklendirir
# - Frontier Clustering: Yakın frontierleri gruplar
# - Stuck Detection: Robot takılırsa farklı yöne yönlendirir
# - Return-to-Start: Harita tamamlanınca başlangıca döner
#
# Optimize edildi: Teknofest yarışması için daire çizme ve harita kayması önlendi
# ============================================================================

frontier_explorer:
  ros__parameters:
    use_sim_time: true
    
    # Topic ve Frame ayarları
    map_topic: /map
    goal_frame: map
    robot_frame: base_footprint
    nav_action: navigate_to_pose
    
    # Hedef seçim parametreleri - DAIRE ÇİZMEYİ ÖNLEMEK İÇİN OPTİMİZE EDİLDİ
    min_goal_distance: 2.5          # Artırıldı: çok yakın goal'ları engelle - daire çizmemesi için (1.5 -> 2.5)
    goal_cooldown_sec: 2.5          # Artırıldı: goal seçim aralığını uzat - daire çizmemesi için (1.5 -> 2.5)
    goal_timeout_sec: 45.0          # Optimize: daha hızlı vazgeçme - zaman tasarrufu
    replan_period_sec: 1.5          # Optimal: sık kontrol
    
    # Harita işleme parametreleri - GÜVENLİK ARTIRILDI
    free_value_max: 10              # 0..10 free kabul et (değişmedi)
    occupied_value_min: 65          # 65..100 occupied kabul et (değişmedi)
    safety_cell_radius: 4           # Artırıldı: goal etrafında daha güvenli alan (3 -> 4) - duvara çarpmayı önler
    
    # Başlangıca dönme parametreleri
    return_to_start: true            # Haritalama bitince başlangıca dön
    start_position_timeout: 10.0     # Başlangıç pozisyonunu kaydetmek için bekleme süresi (saniye)
    
    # GELİŞMİŞ ÖZELLİKLER - TEKNOFEST OPTİMİZASYONLARI
    # Information Gain (Bilgi Kazancı) - Daha büyük keşfedilmemiş alana yakın frontieri önceliklendir
    use_information_gain: true       # Information gain kullan (true/false)
    information_gain_weight: 2.5     # Dengeli: bilgi kazancı önceliklendir ama aşırı agresif olmasın (3.0 -> 2.5)
    information_gain_min_threshold: 1.0  # Minimum info gain - altındaysa distance-based fallback (guardrail)
    distance_normalization_max: 20.0     # Max distance for normalization - scoring stabilitesi için
    
    # Frontier Clustering (Frontier Kümeleme) - Yakın frontieri grupla
    frontier_cluster_distance: 6     # Artırıldı: daha büyük cluster'lar - daha iyi goal seçimi (5 -> 6)
    min_cluster_size: 2              # Azaltıldı: daha fazla seçenek - verimli keşif (3 -> 2)
    
    # Stuck Detection (Takılma Algılama) - TEKNOFEST OPTİMİZASYONU
    stuck_detection_enabled: true    # Takılma algılamayı etkinleştir
    stuck_distance_threshold: 0.5    # Metre - takılı sayılması için maksimum hareket mesafesi
    stuck_time_threshold: 20.0       # Azaltıldı: daha hızlı tespit - zaman tasarrufu (30.0 -> 20.0)
    
    # Performance Optimization (Performans Optimizasyonu)
    roi_radius: 15.0                 # Metre - Region of Interest yarıçapı (sadece robot çevresini tara)
    
    # Visualization & Metrics (Görselleştirme ve Metrikler)
    publish_visualization: true      # Frontier marker'larını yayınla (RViz'de görünsün)
    publish_metrics: true            # Keşif metriklerini yayınla
    visualization_topic: /frontier_markers
    metrics_topic_prefix: /exploration_metrics
