# ============================================================================
# ROS2 Control Controller Manager Konfigürasyonu
# ============================================================================
# Bu dosya ROS2 Control controller manager ve diff drive controller'ı yapılandırır.
#
# Ne yapar: ROS2 Control ile motor kontrolü yönetir.
#           my_robot_hardware paketi ile Arduino'ya komut gönderir.
#
# Controller: diff_drive_controller/DiffDriveController
# - /cmd_vel topic'ini dinler
# - Velocity komutlarını joint'lere gönderir
# - Odometry yayınlar (/odom)
# - TF yayınlar (odom -> base_footprint)
#
# ÖNEMLİ: Bu config ROS2 Control kullanırken gereklidir.
#         Python arduino_bridge.py kullanıyorsanız bu dosya kullanılmaz.
# ============================================================================

controller_manager:
  ros__parameters:
    update_rate: 10  # Hz (Teknofest-AGV değeri)

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController
      
      left_wheel_names: ["left_wheel_joint"]
      right_wheel_names: ["right_wheel_joint"]

      # Teknofest-AGV değerleri (gerçek robot ölçüleri)
      wheel_separation: 0.43  # Controller'da kullanılan efektif değer
      wheels_per_side: 1
      wheel_radius: 0.050  # Controller'da kullanılan efektif değer

      wheel_separation_multiplier: 1.0
      left_wheel_radius_multiplier: 1.0
      right_wheel_radius_multiplier: 1.0

      publish_rate: 50.0
      odom_frame_id: odom
      base_frame_id: base_link  # Teknofest-AGV değeri
      pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
      twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

      open_loop: true
      enable_odom_tf: true

      cmd_vel_timeout: 0.5
      use_stamped_vel: false
      velocity_rolling_window_size: 10

      # Velocity and acceleration limits
      # Whenever a min_* is unspecified, default to -max_*
      linear.x.has_velocity_limits: true
      linear.x.has_acceleration_limits: true
      linear.x.has_jerk_limits: false
      linear.x.max_velocity: 0.5
      linear.x.min_velocity: -0.5
      linear.x.max_acceleration: 2.5
      linear.x.min_acceleration: -2.5

      angular.z.has_velocity_limits: true
      angular.z.has_acceleration_limits: true
      angular.z.has_jerk_limits: false
      angular.z.max_velocity: 2.0
      angular.z.min_velocity: -2.0
      angular.z.max_acceleration: 3.2
      angular.z.min_acceleration: -3.2
