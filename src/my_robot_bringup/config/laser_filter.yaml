# ============================================================================
# LIDAR Box Filter Konfigürasyonu
# ============================================================================
# Bu dosya laser_filters paketinin LaserScanBoxFilter'ını yapılandırır.
#
# Ne yapar: Robot gövdesini ve Karakuri platformunu LIDAR verisinden filtreler.
#           Böylece robot kendini engel olarak algılamaz.
#
# Nasıl çalışır: Belirtilen box (kutu) içindeki LIDAR noktaları silinir.
#                /scan -> /scan_filtered (filtrelenmiş veri)
#
# Ölçüler: Robot + Karakuri platform boyutlarına göre ayarlanmıştır.
#          Box frame: base_link (robot gövdesinin merkezi)
# ============================================================================

scan_filter_chain:
  ros__parameters:
    scan_filter_chain:
      filters:
  - name: zenit_body_filter
    type: laser_filters/LaserScanBoxFilter
    params:
      box_frame: base_link  # LIDAR'ın referans aldığı gövde koordinatı
      min_x: -0.40          # Arka sınır (75cm/2 + güvenlik payı)
      max_x: 0.40           # Ön sınır (75cm/2 + güvenlik payı)
      min_y: -0.35          # Sağ sınır (60cm/2 + güvenlik payı)
      max_y: 0.35           # Sol sınır (60cm/2 + güvenlik payı)
      min_z: -0.1           # LIDAR seviyesinin altı
      max_z: 0.5            # LIDAR seviyesinin üstü (Karakuri profilleri için)
